<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock Project</Canvas></title>
    <link href="src/style.css" rel="stylesheet"></link>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
</head>
<body>
    <div class="container" >
        <h1>
            World Clock
        </h1>

        <select id="city">
            <option value="">Select a city...</option>
            <option value="current">My Current Location</option>
            <option value="Europe/London">London</option>
            <option value="America/New_York">New York</option>
            <option value="Pacific/Aukland">Aukland</option>
        </select>

        <div id="cities">
            <div class="city" id="los-angeles">
                <div>
                    <h2> Los Angeles </h2>
                    <div class="date"></div>
                </div>
                <div class="time"></div>
            </div>
            <div class="city" id="paris">
                <div>
                    <h2> Paris </h2>
                    <div class="date"></div>
                </div>
                <div class="time"></div>
            </div>
        </div>
    </div>
    
    <footer>
        Coded by <strong>Khalea Mitchell</strong> also on <a href="https://github.com/KhaleaM/Plus-AddOn-Week-2">GitHub</a> and Netlify 🌸
    </footer>
    <script src="src/index.js"></script>
</body>
</html>
