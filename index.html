<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock Project</Canvas></title>
    <link href="src/style.css" rel="stylesheet"></link>
</head>
<body>
    <div class="container" >
        <h1>
            World Clock
        </h1>

        <select>
            <option>Choose a city...</option>
            <option>London</option>
            <option>New York</option>
            <option>Aukland</option>
        </select>

        <div class="city">
            <h2> Los Angeles 🇺🇸</h2>
            <div class="date">August 15th 2026</div>
            <div class="time">1:48:15 AM</div>
        </div>
        <div class="city">
            <h2> Sydney 🇦🇺</h2>
            <div class="date">August 15th 2026</div>
            <div class="time">1:48:15 AM</div>
        </div>
    </div>
    
    <footer>
        Coded by Khalea Mitchell also on <a href="https://github.com/KhaleaM/Plus-AddOn-Week-2">GitHub</a> and Netlify 🌸
    </footer>
    <script src="src/index.js"></script>
</body>
</html>
